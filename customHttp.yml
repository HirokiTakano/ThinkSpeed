customHeaders:
  # セキュリティヘッダー + HTML キャッシュ無効化（全パスに適用）
  - pattern: '**/*'
    headers:
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; img-src 'self' data: https://i.ytimg.com https://img.youtube.com; style-src 'self' 'unsafe-inline'; connect-src 'self'; upgrade-insecure-requests"
      - key: X-Frame-Options
        value: DENY
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - key: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - key: Cache-Control
        value: no-store

  # Next.js ハッシュ付き静的アセット（JS/CSS）— 上記の Cache-Control を上書き
  # ファイル名にコンテンツハッシュが含まれるため、永久キャッシュしても安全
  - pattern: '/_next/static/**'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
